# One-click deploy config for Render (https://render.com).
# In Render: New > Blueprint > point at this repo. It reads this file.
services:
  - type: web
    name: pune-auto-deals
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: ADMIN_PASSWORD
        sync: false          # set your own in the Render dashboard
      - key: DATABASE_URL
        sync: false          # Neon Postgres connection string; set in the dashboard.
                             # When present the app uses Postgres (data persists);
                             # without it, it falls back to an ephemeral SQLite file.
      - key: SECRET_KEY
        generateValue: true
      - key: BUSINESS_NAME
        value: AutoLux
      - key: WHATSAPP_NUMBER
        value: "919021970555"
      - key: PYTHON_VERSION
        value: "3.11.9"
