<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ business_name }}{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v={{ asset_v }}">
  {% block head_extra %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  <div class="flash-wrap">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, msg in messages if category != 'find_car_ok' %}
        <div class="flash flash-{{ category }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
  </div>
  {% block body %}{% endblock %}
  <script src="{{ url_for('static', filename='js/app.js') }}?v={{ asset_v }}"></script>
</body>
</html>
